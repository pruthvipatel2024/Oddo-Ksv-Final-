version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: carpool_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: carpooling
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: carpool_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  adminer:
    image: adminer:latest
    container_name: carpool_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  mailpit:
    image: axllent/mailpit:latest
    container_name: carpool_mailpit
    restart: always
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI port

volumes:
  postgres_data:
  redis_data:
